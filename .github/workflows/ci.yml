name: SLAM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/kitti_publisher.py
          echo "Python syntax OK"

      - name: Validate YAML configs
        run: |
          pip install pyyaml
          python -c "
          import yaml, glob, sys
          files = glob.glob('config/*.yaml')
          for f in files:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'OK: {f}')
          "

  docker:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Build Docker image
        run: docker build -t slam-kitti-test .
